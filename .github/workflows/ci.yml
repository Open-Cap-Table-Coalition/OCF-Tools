name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch, so stacked PRs (whose base is an
  # intermediate stack branch, not main) get CI too — not only when they retarget
  # to main. For pull_request, this workflow is read from the PR's head branch.
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run build

      - name: Tests
        run: npm run test:ci
